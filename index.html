<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theo · builds things</title>

  <!-- Inter font (clean, modern) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ----- global reset & variables ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;          /* pure dark (near-black) */
      --card: #111;
      --text: #f5f5f5;
      --muted: #707070;
      --line: #1a1a1a;
      --accent: #36d6ff;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* subtle orbs – kept for depth, but on pure dark bg */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 15%, rgba(255, 255, 255, .03), transparent 35%),
        radial-gradient(circle at bottom, rgba(54, 214, 255, .02), transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: min(430px, 90vw);
      position: relative;
      z-index: 1;
    }

    /* ----- logo / name ----- */
    .logo {
      margin-bottom: 70px;
    }

    .logo h1 {
      font-size: 23px;
      font-weight: 600;
      letter-spacing: -0.04em;
    }

    .logo p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    /* ----- navigation ----- */
    nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    nav a {
      color: #9d9d9d;
      text-decoration: none;
      font-size: 20px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 0;
      position: relative;
      transition: color 0.35s, transform 0.35s cubic-bezier(.22, 1, .36, 1);
    }

    /* thinner, lighter underline – only visible on hover */
    nav a::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;           /* thinner: 1px */
      background: var(--accent);
      opacity: 0.5;          /* lighter: semi-transparent */
      transition: width 0.4s cubic-bezier(.22, 1, .36, 1);
    }

    /* hover: underline appears from left */
    nav a:hover::after {
      width: 100%;
    }

    /* active state: underline only visible when hovered or active */
    nav a.active::after {
      width: 100%;
      opacity: 0.5;
    }

    nav a:hover {
      color: white;
      transform: translateX(6px);
    }

    nav a.active {
      color: white;
    }

    .arrow {
      color: #555;
      transition: transform 0.3s, color 0.3s;
    }

    nav a:hover .arrow {
      transform: translateX(6px);
      color: white;
    }

    /* ----- divider ----- */
    .divider {
      margin: 55px 0 28px;
      height: 1px;
      background: var(--line);
    }

    /* ----- social row ----- */
    .social {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
    }

    .social a {
      text-decoration: none;
      color: #6c6c6c;
      font-size: 14px;
      transition: color 0.3s, transform 0.25s ease;
      position: relative;
    }

    .social a:hover {
      color: white;
    }

    /* thinner, lighter underline on social hover */
    .social a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 0;
      height: 1px;
      background: white;
      opacity: 0.5;
      transition: width 0.3s ease;
    }

    .social a:hover::after {
      width: 100%;
    }

    /* ----- responsive tweaks ----- */
    @media (max-width: 600px) {
      .logo {
        margin-bottom: 55px;
      }

      nav a {
        font-size: 18px;
      }

      .social {
        gap: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- logo / intro -->
    <div class="logo">
      <h1>theo</h1>
      <p>builds things.</p>
    </div>

    <!-- main navigation -->
    <nav>
      <a href="#">
        <span>t3.chat</span>
        <span class="arrow">→</span>
      </a>
      <a href="#">
        <span>t3.tools</span>
        <span class="arrow">→</span>
      </a>
      <a href="#">
        <span>YouTube</span>
        <span class="arrow">→</span>
      </a>
      <a href="#">
        <span>create-t3-app</span>
        <span class="arrow">→</span>
      </a>
      <a href="#">
        <span>blog</span>
        <span class="arrow">→</span>
      </a>
      <a href="#" class="active">
        <span>sponsors</span>
        <span class="arrow">→</span>
      </a>
    </nav>

    <div class="divider"></div>

    <!-- social links -->
    <div class="social">
      <a href="#">GitHub</a>
      <a href="#">X</a>
      <a href="#">YouTube</a>
      <a href="#">Twitch</a>
      <a href="#">Discord</a>
    </div>

  </div>

  <script>
    (function() {
      // ----- navigation active-state management -----
      const navLinks = document.querySelectorAll('nav a');
      let activeLink = document.querySelector('nav a.active');

      // if there's no active link, fallback to first one
      if (!activeLink && navLinks.length) {
        activeLink = navLinks[0];
        activeLink.classList.add('active');
      }

      navLinks.forEach(link => {
        // mouseenter → temporary switch active to hovered item
        link.addEventListener('mouseenter', function() {
          if (activeLink) {
            activeLink.classList.remove('active');
          }
          this.classList.add('active');
        });

        // mouseleave → revert to the stored active link
        link.addEventListener('mouseleave', function() {
          this.classList.remove('active');
          if (activeLink) {
            activeLink.classList.add('active');
          }
        });

        // click → permanently set this link as the active one
        link.addEventListener('click', function(e) {
          e.preventDefault(); // keep demo clean

          // remove active from previous
          if (activeLink) {
            activeLink.classList.remove('active');
          }

          // set new active
          this.classList.add('active');
          activeLink = this;
        });
      });

      // ----- social links subtle lift (via JS) -----
      const socialLinks = document.querySelectorAll('.social a');
      socialLinks.forEach(el => {
        el.addEventListener('mouseenter', function() {
          this.style.transform = 'translateY(-2px)';
        });
        el.addEventListener('mouseleave', function() {
          this.style.transform = 'translateY(0)';
        });
      });
    })();
  </script>
</body>
</html>
